name: CI

# Runs on every push to any branch and every PR targeting main/develop.
# This is what catches intern pushes automatically — no manual trigger needed.
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npm run prettier

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push, just verify it builds)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          target: runner
          tags: nodejs_boilerplate:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max